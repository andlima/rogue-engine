meta:
  id: minimal
  name: Minimal Dungeon
  version: "0.1.0"
  description: A minimal room to prove the engine pipeline works
  player_archetype: player

measurements:
  - id: hp
    label: Hit Points
    min: 0
    max: null
    initial: 10

beings:
  - id: player
    label: Player
    glyph: "@"
    color: white
    measurements:
      hp: 10
    tags: [player]

items: []

map:
  width: 10
  height: 10
  tiles:
    - "##########"
    - "#........#"
    - "#........#"
    - "#........#"
    - "#........#"
    - "#....@...#"
    - "#........#"
    - "#........#"
    - "#........#"
    - "##########"

# Input bindings — the authoritative keymap. Every key the player can
# press lives here. See docs/input-bindings.md for the full vocabulary.
input:
  bindings:
    - { keys: [UP,    k], action: move_n }
    - { keys: [DOWN,  j], action: move_s }
    - { keys: [LEFT,  h], action: move_w }
    - { keys: [RIGHT, l], action: move_e }
  help:
    title: "Commands"
    sections:
      - { header: "Move", actions: [move_n, move_s, move_e, move_w] }
      - { header: "System", actions: [open_help] }
