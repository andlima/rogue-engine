<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>rogue-engine</title>
  <script type="importmap">
    {
      "imports": {
        "yaml": "https://esm.sh/yaml@2.7.0"
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a0a0a;
      color: #cccccc;
      font-family: monospace;
      min-height: 100vh;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px;
      gap: 8px;
    }
    #game {
      display: block;
      background: #0a0a0a;
      image-rendering: pixelated;
      touch-action: none;
    }
    #status {
      font-size: 14px;
      color: #bbbbbb;
      min-height: 1.4em;
      padding: 4px 0;
    }
    #messages {
      width: 100%;
      max-width: 640px;
      max-height: 6em;
      overflow-y: auto;
      font-size: 13px;
      color: #aaaa77;
      line-height: 1.4;
      padding: 4px 8px;
      white-space: pre-wrap;
    }
    #key-hint {
      font-size: 12px;
      color: #888888;
      padding: 4px 0;
      min-height: 1.2em;
    }
    #help {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 10;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    #help.visible {
      display: flex;
    }
    #help pre {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 16px 20px;
      color: #cccccc;
      font-size: 13px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
    }
    #game-over {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 20;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    #game-over.visible {
      display: flex;
    }
    #game-over .panel {
      background: #141414;
      border: 1px solid #333;
      padding: 24px 28px;
      max-width: 90vw;
      width: 360px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      text-align: center;
    }
    #game-over-heading {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    #game-over.win #game-over-heading {
      color: #7fbf7f;
    }
    #game-over.lose #game-over-heading {
      color: #cc6666;
    }
    #game-over-reason {
      font-size: 14px;
      color: #cccccc;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    #game-over .actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }
    #game-over .actions button {
      flex: 1;
      background: #1a1a1a;
      color: #e6e6e6;
      border: 1px solid #333;
      padding: 8px 14px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
    }
    #game-over .actions button:hover {
      background: #242424;
      border-color: #555;
    }
    #game-over-hint {
      font-size: 12px;
      color: #888888;
    }
    #launcher {
      display: none;
      width: 100%;
      max-width: 640px;
      flex-direction: column;
      align-items: stretch;
      gap: 16px;
      padding: 16px 12px;
    }
    #launcher h1 {
      text-align: center;
      color: #cccccc;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    #launcher hr {
      border: none;
      border-top: 1px solid #333;
      margin: 8px 0;
    }
    #launcher-games {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .launcher-game {
      display: block;
      width: 100%;
      text-align: left;
      background: #141414;
      color: #cccccc;
      border: 1px solid #333;
      padding: 10px 14px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
    }
    .launcher-game:hover {
      background: #1d1d1d;
      border-color: #555;
    }
    .launcher-game .title {
      display: block;
      font-weight: bold;
      color: #e6e6e6;
      font-size: 14px;
      margin-bottom: 2px;
    }
    .launcher-game .description {
      display: block;
      font-size: 12px;
      color: #999999;
    }
    #launcher-empty {
      color: #888888;
      font-size: 13px;
      font-style: italic;
      padding: 8px 0;
    }
    #launcher label[for="launcher-upload"] {
      display: block;
      color: #bbbbbb;
      font-size: 13px;
      margin-bottom: 4px;
    }
    #launcher-upload {
      color: #cccccc;
      font-family: monospace;
      font-size: 12px;
    }
    #launcher-error {
      color: #cc4444;
      font-size: 13px;
      min-height: 1.2em;
      padding: 4px 0;
    }
    #back-to-menu {
      position: fixed;
      top: 12px;
      right: 12px;
      background: #141414;
      color: #cccccc;
      border: 1px solid #333;
      padding: 4px 10px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      z-index: 5;
    }
    #back-to-menu:hover {
      background: #1d1d1d;
      border-color: #555;
    }
    body.in-launcher #game,
    body.in-launcher #status,
    body.in-launcher #messages,
    body.in-launcher #key-hint,
    body.in-launcher #help,
    body.in-launcher #game-over,
    body.in-launcher #back-to-menu,
    body.in-launcher #action-bar {
      display: none;
    }
    body.in-launcher #launcher {
      display: flex;
    }
    #action-bar {
      display: none;
    }
    @media (pointer: coarse) {
      #action-bar {
        display: flex;
        flex-wrap: wrap;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #141414;
        border-top: 1px solid #333;
        padding: 6px;
        gap: 4px;
        z-index: 4;
      }
      #action-bar button {
        flex: 1 0 auto;
        min-width: 64px;
        background: #1a1a1a;
        color: #e6e6e6;
        border: 1px solid #333;
        padding: 8px 12px;
        font-family: monospace;
        font-size: 13px;
        cursor: pointer;
      }
      #action-bar button:active {
        background: #242424;
        border-color: #555;
      }
      #back-to-menu {
        display: none;
      }
    }
  </style>
</head>
<body>
  <section id="launcher">
    <h1>rogue-engine</h1>
    <div id="launcher-games"></div>
    <hr>
    <div>
      <label for="launcher-upload">Or upload a YAML file</label>
      <input type="file" id="launcher-upload" accept=".yaml,.yml,text/yaml,application/yaml">
    </div>
    <div id="launcher-error"></div>
  </section>
  <button id="back-to-menu">← Menu</button>
  <canvas id="game" width="882" height="630"></canvas>
  <div id="status"></div>
  <div id="messages"></div>
  <div id="key-hint"></div>
  <div id="help"><pre id="help-body"></pre></div>
  <div id="game-over">
    <div class="panel">
      <div id="game-over-heading"></div>
      <div id="game-over-reason"></div>
      <div class="actions">
        <button id="game-over-play-again" type="button">Play again</button>
        <button id="game-over-menu" type="button">Menu</button>
      </div>
      <div id="game-over-hint">R play again  ·  ESC menu</div>
    </div>
  </div>
  <div id="action-bar"></div>

  <script type="module">
    // Entry point — imports from the same module graph as cli.js:
    //   ./src/config/loader.js   (YAML → definition)
    //   ./src/runtime/state.js   (GameState creation, via session)
    //   ./src/runtime/session.js (surface-agnostic game loop)
    import { loadFromString } from './src/config/loader.js';
    import { createSession } from './src/runtime/session.js';
    import { getVisibleTiles } from './src/runtime/view.js';
    import { computeFOV } from './src/runtime/fov.js';
    import { CanvasRenderer } from './src/renderer/canvas.js';
    import { renderStatus, renderMessages, drawHelpPanel, drawKeyHint } from './src/renderer/ascii.js';
    import { getHelpRows, getKeyHint } from './src/input/help.js';
    import { isValidGameId, getCandidatePaths } from './src/browser/game-select.js';
    import { loadManifest } from './src/browser/manifest.js';
    import {
      computeTouchDir,
      shouldStopRepeating,
      deriveActionBarItems,
      HOLD_INITIAL_DELAY,
      HOLD_REPEAT_INTERVAL,
      TAP_DRAG_THRESHOLD,
    } from './src/browser/touch-controls.js';

    const VIEW_W = 21;
    const VIEW_H = 15;

    const canvasEl = document.getElementById('game');
    const statusEl = document.getElementById('status');
    const messagesEl = document.getElementById('messages');
    const keyHintEl = document.getElementById('key-hint');
    const helpEl = document.getElementById('help');
    const helpBodyEl = document.getElementById('help-body');
    const launcherEl = document.getElementById('launcher');
    const launcherGamesEl = document.getElementById('launcher-games');
    const launcherUploadEl = document.getElementById('launcher-upload');
    const launcherErrorEl = document.getElementById('launcher-error');
    const backToMenuEl = document.getElementById('back-to-menu');
    const gameOverEl = document.getElementById('game-over');
    const gameOverHeadingEl = document.getElementById('game-over-heading');
    const gameOverReasonEl = document.getElementById('game-over-reason');
    const gameOverPlayAgainEl = document.getElementById('game-over-play-again');
    const gameOverMenuEl = document.getElementById('game-over-menu');
    const actionBarEl = document.getElementById('action-bar');

    const isCoarsePointer = window.matchMedia('(pointer: coarse)').matches;

    let session = null;
    let renderer = null;
    let keyHandler = null;
    let manifestCache = null;
    let cachedDefinition = null;
    let overlayOpen = false;
    let currentRedraw = null;

    let touchActive = false;
    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartDir = null;
    let touchHoldDelayTimer = null;
    let touchHoldRepeatTimer = null;
    let touchHoldActive = false;

    function stopTouchHoldRepeat() {
      if (touchHoldDelayTimer != null) {
        clearTimeout(touchHoldDelayTimer);
        touchHoldDelayTimer = null;
      }
      if (touchHoldRepeatTimer != null) {
        clearInterval(touchHoldRepeatTimer);
        touchHoldRepeatTimer = null;
      }
      touchHoldActive = false;
    }

    function domKeyToNamed(event) {
      const k = event.key;
      let base;
      switch (k) {
        case 'ArrowUp':    base = 'UP'; break;
        case 'ArrowDown':  base = 'DOWN'; break;
        case 'ArrowLeft':  base = 'LEFT'; break;
        case 'ArrowRight': base = 'RIGHT'; break;
        case 'Enter':      base = 'ENTER'; break;
        case 'Escape':     base = 'ESC'; break;
        case 'Tab':        base = 'TAB'; break;
        case ' ':          base = 'SPACE'; break;
        case 'Backspace':  base = 'BACKSPACE'; break;
        case 'Delete':     base = 'DELETE'; break;
        case 'Home':       base = 'HOME'; break;
        case 'End':        base = 'END'; break;
        case 'PageUp':     base = 'PAGEUP'; break;
        case 'PageDown':   base = 'PAGEDOWN'; break;
        case 'Insert':     base = 'INSERT'; break;
        default:
          if (k && k.length === 1) {
            base = k;
          } else if (/^F\d{1,2}$/.test(k)) {
            base = k.toUpperCase();
          } else {
            return null;
          }
      }
      const mods = [];
      if (event.ctrlKey) mods.push('CTRL');
      if (event.shiftKey && base.length !== 1) mods.push('SHIFT');
      if (event.altKey) mods.push('ALT');
      return mods.length ? `${mods.join('+')}+${base}` : base;
    }

    function dispatchKeyAndRedraw(key) {
      if (!session) return;
      session.handleKey(key);
      if (currentRedraw) currentRedraw();
    }

    function makeBarButton(label, onClick) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = label;
      btn.addEventListener('click', onClick);
      return btn;
    }

    function renderActionBar() {
      if (!isCoarsePointer) return;
      if (!session || !cachedDefinition) {
        actionBarEl.innerHTML = '';
        updateBodyPadding();
        return;
      }
      const state = session.getState();
      if (state.terminal != null) {
        // Game-over overlay covers the bar; leave previous content untouched.
        return;
      }

      actionBarEl.innerHTML = '';

      if (state.flowState != null && session.getReticle() != null) {
        actionBarEl.appendChild(makeBarButton('✓ Confirm', () => dispatchKeyAndRedraw('ENTER')));
        actionBarEl.appendChild(makeBarButton('✗ Cancel', () => dispatchKeyAndRedraw('ESC')));
        updateBodyPadding();
        return;
      }

      if (state.flowState != null) {
        actionBarEl.appendChild(makeBarButton('✗ Cancel', () => dispatchKeyAndRedraw('ESC')));
        updateBodyPadding();
        return;
      }

      const helpRows = getHelpRows(state.definition, state);
      const items = deriveActionBarItems(helpRows);
      for (const item of items) {
        actionBarEl.appendChild(makeBarButton(item.label, () => dispatchKeyAndRedraw(item.key)));
      }

      actionBarEl.appendChild(makeBarButton('?', () => dispatchKeyAndRedraw('?')));
      actionBarEl.appendChild(makeBarButton('Menu', () => returnToMenu()));

      updateBodyPadding();
    }

    function updateBodyPadding() {
      if (!isCoarsePointer) {
        document.body.style.paddingBottom = '';
        return;
      }
      const h = actionBarEl ? actionBarEl.offsetHeight : 0;
      document.body.style.paddingBottom = h ? `${h}px` : '';
    }

    function showLauncher() {
      document.body.classList.remove('in-game');
      document.body.classList.add('in-launcher');
      updateBodyPadding();
    }

    function showGame() {
      document.body.classList.remove('in-launcher');
      document.body.classList.add('in-game');
    }

    function renderManifestList(entries) {
      launcherGamesEl.innerHTML = '';
      if (!entries || entries.length === 0) {
        const note = document.createElement('div');
        note.id = 'launcher-empty';
        note.textContent = 'No registered games available.';
        launcherGamesEl.appendChild(note);
        return;
      }
      for (const entry of entries) {
        const btn = document.createElement('button');
        btn.className = 'launcher-game';
        btn.dataset.gameId = entry.id;
        const title = document.createElement('span');
        title.className = 'title';
        title.textContent = entry.title;
        const desc = document.createElement('span');
        desc.className = 'description';
        desc.textContent = entry.description;
        btn.appendChild(title);
        btn.appendChild(desc);
        btn.addEventListener('click', () => {
          launcherErrorEl.textContent = '';
          loadRegisteredGame(entry.id);
        });
        launcherGamesEl.appendChild(btn);
      }
    }

    async function ensureManifest() {
      if (manifestCache) return manifestCache;
      try {
        manifestCache = await loadManifest();
      } catch (err) {
        console.error('Failed to load manifest:', err);
        manifestCache = [];
      }
      return manifestCache;
    }

    async function showLauncherView() {
      showLauncher();
      launcherErrorEl.textContent = '';
      const entries = await ensureManifest();
      renderManifestList(entries);
    }

    async function fetchGameYaml(id) {
      const candidates = getCandidatePaths(id);
      let lastErr = null;
      let lastPath = null;
      for (const path of candidates) {
        lastPath = path;
        try {
          const res = await fetch(path);
          if (res.ok) {
            return await res.text();
          }
          lastErr = new Error(`fetch failed: ${res.status}`);
        } catch (err) {
          lastErr = err;
        }
      }
      const detail = lastErr
        ? `${lastErr.message} (last attempted: ${lastPath})`
        : `not found (last attempted: ${lastPath})`;
      throw new Error(detail);
    }

    function startSessionFromYaml(yamlText) {
      const definition = loadFromString(yamlText);
      startSessionFromDefinition(definition);
    }

    function startSessionFromDefinition(definition, opts) {
      teardownSession();
      cachedDefinition = definition;
      session = createSession(definition, opts);
      renderer = new CanvasRenderer(canvasEl, definition.rendering);

      function redraw() {
        if (!session) return;
        const state = session.getState();

        if (state.terminal) {
          if (state.map) {
            const fovMap = computeFOV(state.map, state.player.x, state.player.y);
            const grid = getVisibleTiles(state, VIEW_W, VIEW_H, fovMap);
            renderer.drawGrid(grid, state);
          }
          showGameOverOverlay(state);
          stopTouchHoldRepeat();
          return;
        }
        hideGameOverOverlay();
        renderActionBar();

        if (session.getHelpOpen()) {
          helpBodyEl.textContent = drawHelpPanel(getHelpRows(state.definition, state));
          helpEl.classList.add('visible');
          return;
        }
        helpEl.classList.remove('visible');

        if (session.getQuitPending()) {
          statusEl.textContent = 'Quit? (y/n)';
          return;
        }

        const fovMap = state.map ? computeFOV(state.map, state.player.x, state.player.y) : undefined;
        const grid = getVisibleTiles(state, VIEW_W, VIEW_H, fovMap);
        renderer.drawGrid(grid, state);

        const reticle = session.getReticle();
        if (reticle) {
          const halfW = Math.floor(VIEW_W / 2);
          const halfH = Math.floor(VIEW_H / 2);
          const viewOrigin = { x: state.player.x - halfW, y: state.player.y - halfH };
          const indicator = definition.ui?.hud?.target_indicator || { glyph: '*', color: 'yellow' };
          renderer.drawReticle(grid, viewOrigin, reticle, indicator);
        }

        statusEl.textContent = renderStatus(state);
        messagesEl.textContent = renderMessages(state).join('\n');
        messagesEl.scrollTop = messagesEl.scrollHeight;

        const hint = getKeyHint(state.definition, state, session.getIntrinsicHints());
        keyHintEl.textContent = hint ? drawKeyHint(hint) : '? help  ·  CTRL+c quit';
      }

      currentRedraw = redraw;

      keyHandler = (event) => {
        if (!session) return;
        const key = domKeyToNamed(event);
        if (key == null) return;
        if (overlayOpen) {
          event.preventDefault();
          if (key === 'r' || key === 'R') {
            playAgain();
          } else if (key === 'ESC' || key === 'm' || key === 'M') {
            returnToMenu();
          }
          return;
        }
        event.preventDefault();
        session.handleKey(key);
        redraw();
      };
      document.addEventListener('keydown', keyHandler);

      showGame();
      redraw();
    }

    function showGameOverOverlay(state) {
      overlayOpen = true;
      gameOverHeadingEl.textContent = state.terminal === 'win' ? 'Victory' : 'Defeated';
      gameOverReasonEl.textContent = state.terminalReason ?? 'Game over.';
      gameOverEl.classList.remove('win', 'lose');
      gameOverEl.classList.add(state.terminal === 'win' ? 'win' : 'lose');
      gameOverEl.classList.add('visible');
      helpEl.classList.remove('visible');
    }

    function hideGameOverOverlay() {
      overlayOpen = false;
      gameOverEl.classList.remove('visible', 'win', 'lose');
    }

    function playAgain() {
      if (!cachedDefinition) return;
      startSessionFromDefinition(cachedDefinition, { seed: Date.now() });
    }

    async function returnToMenu() {
      try {
        teardownSession();
      } catch (err) {
        console.error('Teardown error:', err);
      }
      history.pushState({}, '', window.location.pathname);
      await showLauncherView();
    }

    function teardownSession() {
      if (keyHandler) {
        document.removeEventListener('keydown', keyHandler);
        keyHandler = null;
      }
      stopTouchHoldRepeat();
      touchActive = false;
      try {
        if (renderer) renderer.clear();
      } catch (_) { /* ignore */ }
      statusEl.textContent = '';
      messagesEl.textContent = '';
      keyHintEl.textContent = '';
      helpEl.classList.remove('visible');
      hideGameOverOverlay();
      session = null;
      renderer = null;
      currentRedraw = null;
      if (actionBarEl) actionBarEl.innerHTML = '';
      updateBodyPadding();
    }

    async function loadRegisteredGame(id) {
      try {
        const yamlText = await fetchGameYaml(id);
        startSessionFromYaml(yamlText);
        history.pushState({}, '', `?game=${id}`);
      } catch (err) {
        launcherErrorEl.textContent = `Failed to load game "${id}": not found.`;
        console.error(`Failed to load game "${id}":`, err);
      }
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error || new Error('FileReader error'));
        reader.readAsText(file);
      });
    }

    launcherUploadEl.addEventListener('change', async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      launcherErrorEl.textContent = '';
      const filename = file.name;
      try {
        const text = await readFileAsText(file);
        startSessionFromYaml(text);
      } catch (err) {
        launcherErrorEl.textContent = `Failed to load uploaded file "${filename}": ${err.message}.`;
        console.error(`Failed to load uploaded file "${filename}":`, err);
        launcherUploadEl.value = '';
      }
    });

    backToMenuEl.addEventListener('click', () => {
      returnToMenu();
    });

    if (isCoarsePointer) {
      canvasEl.addEventListener('touchstart', (event) => {
        if (!session) return;
        const state = session.getState();
        if (state.terminal != null) return;
        if (session.getHelpOpen()) return;
        if (session.getQuitPending()) return;

        // Two simultaneous touches must not start two repeat timers.
        stopTouchHoldRepeat();

        if (!event.touches || event.touches.length === 0) return;
        const touch = event.touches[0];
        const rect = canvasEl.getBoundingClientRect();
        touchActive = true;
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        touchStartDir = computeTouchDir(touch.clientX, touch.clientY, rect);

        // Hold-to-repeat is disabled during reticle/flow mode.
        if (state.flowState != null) {
          event.preventDefault();
          return;
        }

        touchHoldDelayTimer = setTimeout(() => {
          touchHoldDelayTimer = null;
          touchHoldActive = true;
          fireHoldStep();
          if (touchHoldActive) {
            touchHoldRepeatTimer = setInterval(fireHoldStep, HOLD_REPEAT_INTERVAL);
          }
        }, HOLD_INITIAL_DELAY);

        event.preventDefault();
      }, { passive: false });

      canvasEl.addEventListener('touchmove', (event) => {
        // Suppress default scroll/zoom during a touch — direction is
        // locked to the initial touch position regardless of drag.
        if (touchActive) event.preventDefault();
      }, { passive: false });

      canvasEl.addEventListener('touchend', (event) => {
        if (!touchActive) return;

        const wasHoldActive = touchHoldActive;
        stopTouchHoldRepeat();
        touchActive = false;

        if (wasHoldActive) {
          event.preventDefault();
          return;
        }

        if (!session) return;
        const state = session.getState();
        if (state.terminal != null) return;
        if (session.getHelpOpen()) return;
        if (session.getQuitPending()) return;

        let endX = touchStartX;
        let endY = touchStartY;
        if (event.changedTouches && event.changedTouches.length > 0) {
          endX = event.changedTouches[0].clientX;
          endY = event.changedTouches[0].clientY;
        }
        const dx = Math.abs(endX - touchStartX);
        const dy = Math.abs(endY - touchStartY);
        if (dx > TAP_DRAG_THRESHOLD || dy > TAP_DRAG_THRESHOLD) {
          event.preventDefault();
          return;
        }

        if (touchStartDir) {
          dispatchKeyAndRedraw(touchStartDir);
        }
        event.preventDefault();
      }, { passive: false });

      canvasEl.addEventListener('touchcancel', () => {
        stopTouchHoldRepeat();
        touchActive = false;
      });

      // Tap-to-dismiss the help overlay — without this, mobile users get
      // stuck since the overlay covers both the canvas and the '?' button.
      helpEl.addEventListener('click', (event) => {
        if (!session || !session.getHelpOpen()) return;
        event.preventDefault();
        dispatchKeyAndRedraw('?');
      });

      window.addEventListener('resize', updateBodyPadding);
    }

    function fireHoldStep() {
      if (!session || !touchStartDir) {
        stopTouchHoldRepeat();
        return;
      }
      const prevState = session.getState();
      if (prevState.terminal != null
          || prevState.flowState != null
          || session.getHelpOpen()
          || session.getQuitPending()) {
        stopTouchHoldRepeat();
        if (currentRedraw) currentRedraw();
        return;
      }
      session.handleKey(touchStartDir);
      const nextState = session.getState();
      if (currentRedraw) currentRedraw();
      if (shouldStopRepeating(prevState, nextState, touchStartDir)) {
        stopTouchHoldRepeat();
      }
    }

    gameOverPlayAgainEl.addEventListener('click', () => {
      playAgain();
    });

    gameOverMenuEl.addEventListener('click', () => {
      returnToMenu();
    });

    async function boot() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get('game');
      if (raw && isValidGameId(raw)) {
        showGame();
        try {
          const yamlText = await fetchGameYaml(raw);
          startSessionFromYaml(yamlText);
        } catch (err) {
          statusEl.textContent = `Failed to load game "${raw}": not found.`;
          console.error(`Failed to load game "${raw}":`, err);
        }
        return;
      }
      await showLauncherView();
    }

    boot();
  </script>
</body>
</html>
